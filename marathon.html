<script>
    const itemBackground = document.getElementById("item-background");
    const ctx = itemBackground.getContext('2d');
    const clamp = (num, min, max) => Math.min(Math.max(num, min), max);

    const gradient = ctx.createLinearGradient(0, 0, 8, 4);
    gradient.addColorStop(0, "#20805b");
    gradient.addColorStop(0.8, "#35363f");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 8, 4);

    const tooltipBox = document.getElementById("tooltip");
    window.onmousemove = function (e) {
        var x = clamp(e.clientX + 40, 0, window.innerWidth - tooltipBox.offsetWidth);
        var y = clamp(e.clientY - 100, 0, window.innerHeight - tooltipBox.offsetHeight);
        tooltipBox.style.top = y + 'px';
        tooltipBox.style.left = x + 'px';
    };

    // window.onmouseover = function (e) {
    //     console.log(e);
    // }
</script>
