<style>

    /* #region Boiler Plate */

    @font-face {
        font-family: 'KH Interference Regular';
        src: url('KHInterference/WOFF2/KHInterferenceTRIAL-Regular.woff2') format('woff2'),
            url('KHInterference/WOFF/KHInterferenceTRIAL-Regular.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'KH Interference Light';
        src: url('KHInterference/WOFF2/KHInterferenceTRIAL-Light.woff2') format('woff2'),
            url('KHInterference/WOFF/KHInterferenceTRIAL-Light.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    @font-face {
        font-family: 'KH Interference Bold';
        src: url('KHInterference/WOFF2/KHInterferenceTRIAL-Bold.woff2') format('woff2'),
            url('KHInterference/WOFF/KHInterferenceTRIAL-Bold.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    /* #endregion */

    body {
        background-color: #25242b;
        overflow: hidden;
    }

    .tooltip {
        width: 300px;
        height: 300px;
        background: #35363f;
        position: absolute;
        z-index: 1;
        opacity: 0;
        transition: opacity 0.1s ease-in-out;
    }

    body:has(.item:hover) .tooltip {
        opacity: 1;
    }

    .tooltip div {
        font-family: 'KH Interference Regular';
        font-size: 15px;
    }

    .tooltip > .rarity-bar {
        height: 30px;
        width: 100%;
        display: grid;
        grid-template-areas: "type-icon type value";
        grid-template-columns: 30px auto 42px;
    }

    .enhanced > .rarity-bar {
        background-color: #00f587;
    }

    .rarity-bar div {
        padding-top: 9px;
    }

    .rarity-bar > .type {
        padding-left: 10px;
        border-left: solid #585858 1px;
    }

    .item {
        position: relative;
        height: 100%;
        cursor: pointer;
        outline: solid #00000000 2px;
        transition: outline-color 0.2s ease-in-out;
    }

    .item:hover {
        outline: solid #00f587 2px;
    }

    .item-type {
        position: absolute;
        top: 0;
        left: 0;
        width: 50px;
        height: 18px;
        pointer-events: none;
    }

    .enhanced > .item-type {
        background: #00f587;
    }

    .item-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        image-rendering: pixelated;
        pointer-events: none;
    }

    .ui-sections {
        display: grid;
        grid-template-areas: 
            "shell-stats weapons inventory"
            "shell-stats shell-loadout inventory";
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        place-items: center;
        height: 100%;
    }

    .shell-loadout {
        grid-area: shell-loadout;
        width: auto;
        display: grid;
        grid-template-areas: 
            "equipment shell shield"
            "core1 shell core2"
            "implant1 implant2 implant3";
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
    }

    .equipment {
        grid-area: equipment;
    }

    .shield {
        grid-area: shield;
    }

    .core1 {
        grid-area: core1;
    }

    .core2 {
        grid-area: core2;
    }

    .implant1 {
        grid-area: implant1;
    }

    .implant2 {
        grid-area: implant2;
    }

    .implant3 {
        grid-area: implant3;
    }

    .shell {
        grid-area: shell;
    }

    .item-slot {
        background-color: #35363f;
        margin: 0px 4px;
        /* overflow: hidden; */
    }

    .item-slot.size2x1 {
        height: 65px;
        width: 130px;
    }

    .slot-title {
        font-family: 'KH Interference Regular';
        font-size: 16px;
        color: #ffffff;
        height: 20px;
        margin: 20px 4px 0px;
        transform: translateY(2px);
    }

</style>
<script>
    const itemBackground = document.getElementById("item-background");
    const ctx = itemBackground.getContext('2d');

    const gradient = ctx.createLinearGradient(0, 0, 8, 4);
    gradient.addColorStop(0, "#20805b");
    gradient.addColorStop(0.8, "#35363f");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 8, 4);

    const tooltipBox = document.getElementById("tooltip");
    window.onmousemove = function (e) {
        var x = e.clientX + 40;
        var y = e.clientY - 100;
        tooltipBox.style.top = y + 'px';
        tooltipBox.style.left = x + 'px';
    };

    // window.onmouseover = function (e) {
    //     console.log(e);
    // }
</script>
